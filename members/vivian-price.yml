Name: Vivian Price
Campus: Dominguez Hills
College: College of Arts & Humanities
Department: Women'S, Interdisciplinary, And Environmental Studies
Title: Professor
Email: vprice@csudh.edu
Research Interests: 'The movement of capital away from (and towards)
  economies based on fossil fuel and the international wave of transition towards
  the development of low emission societies, Environmental justice and equality, The
  technological basis of change, Policy, And financial investments to understand what
  impact these forces have on workers and their organizations, On marginalized communities,
  In the global north and south, While also identifying the agency of these groups
  to exert power and negotiate their interests, The concept of "just transition" in
  many sectors, Including construction, Oil and coal, Lithium, Forestry and the public
  sector'
Teaching Interests: 'Political action, Electoral politics, Social
  movements, Critical gender and racial formation, Queer activism, Qualitative research
  and creative expression'
Sustainability Contributions: 'Founded the Labor, Social, and Environmental Justice
  Fair Publications: A member of the "Build It Green," Climate Industry Research Team
  focusing on how construction training in Europe, the US, and Canada incorporates
  climate literacy for the Canadian Building Trades Unions. Co-researcher and co-author
  for the "Decarbonising and Diversifying Defence: A Workers'' Enquiry" which analyzed
  how workers in military industries in the US and the UK view the need to decarbonize
  and convert their workplaces towards socially useful purposes, a study funded by
  the British Academy. Member of the Norwegian based research group,"Work, Labour,
  and Greening the Economy" studying how oil workers/unions in Norway, Nigeria, and
  North America view the phasing out of oil. Member of the Critical Minerals Just
  Transition Listening Project funded by the Sloan Foundation, studying various sites
  exemplifying the lithium lifecycle in the United States. Produced several films
  on Just Transitions, most recently Voices from the green transition for the “Transition:
  action, concepts, debates and strategies - an international comparison,” a study
  based in the Leeds School of Business.'
