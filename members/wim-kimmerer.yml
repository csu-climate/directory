Research Interests: 'Small pelagic organisms in primarily the
  san francisco estuary, And their success in response to varying freshwater input,
  Strong tides, And abundant introduced species and predators. specific topics include
  how freshwater flow moves the salinity gradient, Population dynamics of key zooplankton
  species, The planktonic food web supporting longfin smelt, Delta smelt, And other
  fishes of the upper estuary, Modeling the declining delta smelt population, Effects
  of species introductions to the estuary, Wetlands as habitat for planktonic organisms,
  And the management implications of these findings.'
