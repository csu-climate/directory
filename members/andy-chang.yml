Research Interests: 'How geographic patterns of diversity in estuarine
  and coastal systems are controlled by environmental drivers and biotic interactions.
  use of estuaries as a laboratory to understand human influences on coastal ecosystems
  and to test fundamental ecological theories about the factors that control species
  diversity, Abundance, And ecosystem functioning. work in the marine invasions lab
  focuses on the influence of freshwater flow and temperature variation on marine
  invertebrate community assembly, Biogeography, Invasion patterns, And native oyster
  population dynamics.'
