Name: Athanasios "Alex" Alexandrou
Campus: Fresno State
College: Agricultural Sciences and Technology
Department: Industrial Technology
Title: Professor
Email: aalexandrou@csufresno.edu
Research Interests: 'Electrification of agricultural equipment,
  Air quality for agricultural operations, Truck emission control systems, Cold plasma
  technology and its applications in agriculture, And automation.'
Teaching Interests: 'Industrial control systems, Automation.'
Sustainability Contributions: Air quality mitigation and the monitoring of pollutants
  within agricultural production practices. Work in air quality involves extensive
  research into the monitoring and suppression of fugitive dust, particulate matter
  (PM2.5 and PM10), and organic compounds such as fungal spores and pollen during
  agricultural field operations. Current work involves the Heavy-Duty Inspection and
  Maintenance Referee Program (Clean Truck Check) and analyzing agricultural equipment
  activity data to better understand and manage sector-wide emissions. Served as a
  consultant on agricultural electrification needs in California and spearheaded research
  into the environmental benefits of biomass production for the European Union in
  2011.
