Name: Carlie Pietsch
Campus: San Jose
College: College of Science
Department: Geology
Title: Associate Professor
Email: carlie.pietsch @ sjsu.edu
Research Interests: 'Research focuses on paleontology and deep
  time marine biology. the sjsu paleontology lab group combines geologic observations
  with marine ecology and evolution to interpret the history of life on earth with
  a focus on mollusks (clams and snails) and extreme climate change events'
Teaching Interests: 'Earth history, Earth system science, Paleontology,
  Sedimentology/stratigraphy, And data analysis using r. her teaching includes equity
  based practices such as equity grading, Flipped instruction, And course based research
  projects.'
Sustainability Contributions: Performed research on extreme climate events which serves
  as both an approximation of what we might expect as a result of modern climate change
  and as a window into the role of climate on evolutionary trajectories.
