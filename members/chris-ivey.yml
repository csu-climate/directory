Name: Chris Ivey
Campus: Chico
College: College of Biological Sciences
Department: Biological Sciences
Title: Associate Professor
Email: ctivey@csuchico.edu
Research Interests: 'Dr. ivey studies the evolution and ecology
  of plants and insects. his work focuses on plant-insect interactions, The evolution
  of mating systems, Reproductive ecology, And plant defense. his current projects
  include studies of genetic variation and phenotypic selection of mating system and
  physiological traits in clarkia and mimulus, Identifying patterns and mechanisms
  of speciation in mimulus, And testing how induced anti-herbivore defenses alter
  sex allocation in mimulus guttatus.'
Teaching Interests: ''
Sustainability Contributions: One of his lab's recent projects studied how valley
  oak trees, both a keystone and indicator species, may be impacted by climate change.
