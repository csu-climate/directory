Research Interests: 'Research Interests: The temporal and spatial patterns in abundance
  and distribution of marine species, Including patterns that occur as a result of
  both natural processes and human impacts. specific topics include 1. ecological
  impacts, Patterns and mechanisms of the spread of non-native species, 2. restoration
  of important benthic habitats including oyster and eelgrass beds, And 3. patterns
  in species abundance and richness over different temporal and spatial scales. additional
  interest in education and outreach and ways in which to involve the public in “citizen
  science” to build capacity for environmental monitoring for conservation.'
