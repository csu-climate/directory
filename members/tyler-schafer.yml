Sustainability Contributions: Professor Schafer is interested in urban community formation,
  culture, and sustainability. He is working on a project with colleagues from UNLV
  in which they examine what is being said and done in the name of sustainability
  in Southern Nevada, and compare this “vision” of sustainability to various sustainability
  measures.
