Title: 'Faculty/Director of The Citizen Scientist Project

  Assistant Professor of Teacher Education'
Email: bbeck4@csub.edu
Research Interests: 'My research sits at the intersections of
  climate justice, Ocean literacy, Teacher education, Youth and educator activism,
  And citizen and community science. as a national geographic explorer and associate
  professor of teacher education, I am interested in how storytelling, Data, And lived
  experience come together to shape how young people and educators understand and
  respond to environmental change. my work explores how classrooms can become spaces
  where students investigate local environmental issues, Contribute to real scientific
  and community knowledge, And tell stories with data about the places they care about.
  through partnerships with schools, Scientists, And communities, I study how inquiry-driven,
  Place-based learning experiences can empower youth and educators to become informed
  storytellers, Investigators, And advocates working toward more just and sustainable
  environmental futures.'
Teaching Interests: 'Teaching Interests: My teaching interests focus on the integration
  of science, Social studies, And environmental education within teacher education
  programs, With an emphasis on community-embedded and place-based teaching. i am
  particularly interested in preparing future educators to help students investigate
  environmental issues through interdisciplinary approaches that connect ecological
  systems, Civic decision making, Cultural knowledge, And community perspectives.
  my teaching emphasizes inquiry, Storytelling with data, And citizen and community
  science as pathways for engaging youth in understanding and responding to environmental
  challenges in the places where they live.'
Sustainability Contributions: My sustainability contributions include securing and
  leading grant-supported initiatives, including projects funded by the United States
  Department of Education and the National Geographic Society, that build capacity
  for citizen and community science in schools and teacher education programs. Through
  these efforts, I work to equip educators and students with tools to investigate
  issues such as air quality, biodiversity, and water systems while developing pathways
  for youth civic engagement. I also collaborate with California State Parks to convene
  scientists, storytellers, and educators in shared learning experiences that draw
  inspiration from the land and from one another, helping translate place-based environmental
  knowledge into meaningful educational practice. In addition, I contribute to National
  Geographic’s Pristine Seas initiative, where I help develop ocean literacy and conservation
  education programs in collaboration with youth, educators, universities, and ministries
  of education around the world, supporting the integration of science, storytelling,
  and education in efforts to protect marine ecosystems.
