Name: Joseph Kim
Campus: Long Beach
College: College of Engineering
Department: Civil Engineering & Construction Engineering Management
Title: Chair, Civil Engineering & Construction Engineering Management
Email: joseph.kim@csulb.edu
Research Interests: 'As a director of green bim laboratory, Dr.
  kim focuses on sustainable design and construction in built environment and infrastructure,
  Advanced construction scheduling using optimization techniques, Building information
  modeling, Cost estimating methods, International construction, Information technology
  in construction operations, Project delivery systems, And statistical methods for
  construction engineers'
Teaching Interests: 'Sustainability in the built environment,
  Sustainability in infrastructure systems, Sustainability and green construction'
Sustainability Contributions: 'Internationally recognized for his research in sustainability
  for building and infrastructure systems, Dr. Kim has published 34 journal articles,
  contributed to 47 peer-reviewed conference proceedings, and delivered 36 oral and
  poster presentations at national and international conferences. Of these, 10 journal
  articles, 13 proceedings, and 48 presentations are directly related to sustainability
  and environmental engineering. A few keynote speeches include the following: - “Current
  Research Status for Recycled Construction Materials for Better Built Environments”
  at the 2024 Sustainable Materials, Environment and Technologies under Climate Change
  Scenario. - “Recycled Construction Materials: Current Status and Future Research
  Directions” at the 2024 13th International Conference on Environment, Energy and
  Biotechnology. Dr. Kim’s dedication to undergraduate research has also been nationally
  recognized. His collaborative work with undergraduate students earned Best Research
  Presentation at the 2014 SACNAS National Conference for “Green Building Materials:
  Fabricating Sandwich Panels for Structural Use”, and was featured at the 30th Anniversary
  National Conference on Undergraduate Research for “Fabricating and Testing Composite
  Sandwich Panel Specimens Made of Green Building Materials.”.'
