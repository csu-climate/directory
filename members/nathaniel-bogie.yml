Name: Nathaniel  Bogie
Campus: San Jose
College: College of Science
Department: Geology
Title: Assistant Professor
Email: nathaniel.bogie@sjsu.edu
Research Interests: 'Professor bogie''s research focuses on how
  the traditional practice of intercropping with deep rooted native shrubs in the
  west african sahel can serve as pumps to transfer water from deep, Moist soil layers
  to shallow-rooted food crops growing nearby during extreme drought. his work in
  california involves studying links between geology and stream behavior in salmonid-bearing
  coastal watersheds as well as how the use of winter cover crops affects soil hydraulic
  properties and groundwater recharge.'
Teaching Interests: 'Hydrogeology, Vadose zone hydrology, Sustainability'
Sustainability Contributions: Research on irrigation and crop growth for California's
  Central Valley. Research on geologic controls on streamflow behavior in salmonid-bearing
  watersheds.
