Name: Weimin Li
Campus: Pomona
College: College of Environmental Design
Department: Landscape Architecture
Title: Professor/Graduate Coordinator
Email: wli@cpp.edu
Research Interests: 'Research Interests: Researches the environmental and social impacts
  of contemporary landscape design and planning on multiple dimensions of sustainability
  and quality of life in urban and rural settings, Using geospatial technologies and
  big data applications to support sustainable, Climate-resilient communities and
  environmental justice.'
Teaching Interests: 'Teaching Interests: Systematic landscape design and planning,
  Geodesign, Geospatial technologies'
Sustainability Contributions: Her work integrates multi-scale ecological design and
  planning, geodesign, and big data–driven decision support to advance sustainable,
  climate-resilient, and environmentally just communities. She has led and contributed
  to many award-winning research and applied projects serving underserved urban, suburban,
  and agricultural communities across California and beyond, with support from federal,
  state, regional, and local agencies.
