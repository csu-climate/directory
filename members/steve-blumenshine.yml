Sustainability Contributions: Executive Director of CSU-WATER. Develops and strengthens
  water research and scholarship across CSU campuses, focused on critical agricultural,
  urban, and environmental water issues in California, with an awareness of governmental
  and societal roles in the allocation of overprescribed and stressed water resources.
Notes: 'Contributor to: https://www.calstate.edu/impact-of-the-csu/research/water/Pages/about-us.aspx;
  Research Interests: Topics include fish ecology and population dynamics, fish predation
  and bioenergetics, aquatic food webs, water supply and quality. Research has focused
  on headwater streams in the Sierra, foothill rivers, reservoirs, and watersheds,
  the San Joaquin River, flooded Ag fields as conservation habitat in the Central
  Valley, and the SF Bay-Delta.; Teaching interests: Ecology, aquatic ecology, ichthyology,
  plant disease ecology, biostatistics.; I believe he requested that these two sections
