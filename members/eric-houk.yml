Research Interests: 'Dr. houk’s research interests are the economics
  of water allocation and water conservation in the western united states. specifically,
  He has examined the economic impacts of water transfers from agriculture for endangered
  species preservation, The economic effects of irrigation induced waterlogging and
  soil salinization, And the impact of water conservation efforts on residential water
  demand. he is currently examining the economic and hydrologic impacts of various
  water management scenarios in the north state.'
