Teaching Interests: ''
Sustainability Contributions: Professor Stemen facilitated the inaugural Faculty Learning
  Community (FLC) in Teaching Climate Change and Resilience in 2022. The FLC ultimately
  redesigned 75 classes to offer greater engagement in climate change throughout 6
  CSU campuses. He also serves on the city of Chico’s Climate Action Commission. He
  has hosted over a dozen faculty development workshops on integrating sustainability
  into the college curriculum.
