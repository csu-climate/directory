Name: Hongye Wang
Campus: East Bay
College: College of Science
Department: Biological Sciences
Title: Assistant Professor
Email: hongye.wang@csueastbay.edu
Research Interests: 'Understanding how foodborne pathogens persist
  in food and food-related environments and developing strategies to detect and control
  these pathogens. current research includes 1) exploring the dynamics of foodborne
  pathogens in pre-harvest ecosystems of fresh produce, 2) using next-generation sequencing
  approaches to understand interactions between foodborne pathogens and indigenous
  microbiota in fresh produce and pre-harvest environments, As well as within food
  processing facilities, And 3) understanding the effect of environmental factors
  on pathogen persistence in food or food-related systems.'
Teaching Interests: 'General microbiology and medical microbiology.'
Sustainability Contributions: Developing precision, residue-safe pathogen-control
  strategies that lower microbial risks prevent food waste from spoilage and recalls.
