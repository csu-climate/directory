Sustainability Contributions: 'Dean Todd Developed an interdisciplinary course on
  Global Climate Change. Her work examines the way environmental rhetoric shapes our
  community history and sense of place. Her most recent book, Valley of Heart''s Delight:
  Environment and Sense of Place in the Santa Clara Valley, focuses on the agricultural
  history of Silicon Valley. Her book, Communicating Environmental Patriotism: A Rhetorical
  History of the American Environmental Movement received the Christine Oravec Environmental
  Communication Research Award. She has also published more than 30 scholarly journal
  articles and book chapters, including research on climate literacy, gardening and
  food activism, and environmental messages in popular culture. Dean Todd is a founding
  member of the International Environmental Communication Association and served on
  the advisory board of the Green Ninja Project. Former chair of the University Sustainability
  Board.'
