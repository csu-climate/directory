Name: Alison O'Dowd
Campus: Humboldt
College: College of Natural Resources & Sciences
Department: Environmental Science & Management
Title: Professor
Email: alison.odowd@humboldt.edu
Research Interests: 'River ecology and food webs, Impacts of dams
  and dam removal on aquatic ecosystems, Ecological restoration'
Teaching Interests: 'Teaching Interests: Environmental science and ecological restoration.'
Sustainability Contributions: Co-director of Humboldt River institute, leading research
  in river ecology and ecological restoration, particularly focusing on freshwater
  systems and community response to watershed disturbance. Expert research on stream
  and wetland restoration, including studies of benthic macroinvertebrates as indicators
  of water quality—used for developing bioassessment indices. Pioneering work on dam
  removal impacts, including a major project funded ($814 k) by the California Wildlife
  Conservation Board to examine effects of the largest dam removal in U.S., focusing
  on salmonid food webs, water quality, and informing future dam‑removal ecology.
  Plays a significant role in student sustainability training, mentoring undergraduates
  and graduate students in applied field research.
