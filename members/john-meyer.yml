Name: John Meyer
Campus: Humboldt
College: College of Arts, Humanities & Social Sciences
Department: Politics
Title: Professor
Email: john.meyer@humboldt.edu
Research Interests: 'Research Interests: Ways in which environmental concerns can
  become the basis for effective social criticism.'
Teaching Interests: 'Teaching Interests: Two overlapping areas: political ideas and
  the politics of environmental sustainability. introduction to political theory,
  Environmental politics, Contemporary political theory, Radical political thought,
  Politics of sustainability, And seminars on a variety of themes including property,
  Democracy, The politics of everyday life, And environmental political theory'
Sustainability Contributions: Active in Humboldt’s interdisciplinary programs on Environment
  and Community and Environmental Studies. Founding coordinator of the interdisciplinary
  M.A. program in Environment and Community (2000-2004), have served as the advisor
  for the Campus Center for Appropriate Technology (CCAT), facilitated the creation
  of a new environmental studies major, and have served on the university’s sustainability
  steering committee.
