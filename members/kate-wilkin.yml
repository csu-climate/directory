Sustainability Contributions: Professor Wilkin's lab investigates how fire interacts
  with plants, plant communities, ecosystems, and our communities from wilderness
  areas to the wildland urban interface. The lab's research and outreach explores
  fire adaptations, wildfire recovery, climate change resilience, prescribed fire
  and surrogates, Home Ignition Zones (HIZ), and Fire Adapted Communities (FAC).
