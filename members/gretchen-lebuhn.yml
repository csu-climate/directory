  and other wildlands. developing cost-efficient monitoring, The role of climate change
  as well and the effects of urbanization on wildlife.'
Teaching Interests: ''
Sustainability Contributions: Director of the Great Sunflower Project, the largest
  citizen science project focused on pollinators in the world. It's designed to evaluate
  the effects of landscape change on pollinator service in North America and provide
  tools for participants to take conservation actions.
