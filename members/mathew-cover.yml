Name: Mathew Cover
Campus: Stanislaus
College: College of Science
Department: Biological Sciences
Title: Professor of Ecology
Email: mcover@csustan.edu
Research Interests: 'Stream ecology, Watershed sciences, Biological
  monitoring of water quality with invertebrates, Inclusive teaching, Culture change
  in stem education.'
Teaching Interests: 'Freshwater ecology, Ecology, Science writing'
Sustainability Contributions: Recent work includes collaborative projects to understand
  how patterns of sediment dynamics and riparian wood loading affect habitat for juvenile
  coho salmon in Lagunitas Creek (Marin County) and how bank armoring influences stream
  communities in Southern California. Professor Cover works with students, water quality
  managers, and community groups to develop field, laboratory, and analytical methods
  to examine patterns in stream health throughout watersheds. He is also a water expert
  for CSU-WATER.
