Sustainability Contributions: 'Research on the policies of environmental hazards,
  genetic information, and safety

  Created the Environmental Law, Policy, and Society course focused on themes, doctrines,
  and research in environmental policy and law, including the public trust doctrine,
  environmental justice, EPA regulation, and toxic torts, along with questions of
  economic incentives and equity

  Served on the American Sociological Association Task Force on Sociology and Global
  Climate Change

  Served as contributing editor of a special issue of International Journal of Sociology
  and Social Policy on “Science and Technology” that addressed environmental issues

  Published The Company Doctor: Risk, Responsibility, and Corporate Professionalism
  and Risky Business: Genetic Testing and Exclusionary Practices in the Hazardous
  Workplace

  Served on award committees responsible for evaluating environmental research and
  publications

  Organized and chaired conference sessions and presented for multiple legal, sociological,
  and public health organizations as an Environmental Policy and Research Session
  Organizer and Chair

  Served as CEaS, CEA-CREST, and Hydrology Affiliated Faculty'
