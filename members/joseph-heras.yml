Research Interests: 'Research Interests: Uses genomes, Transcriptomes, Microbiomes,
  And microplastics to answer questions related to adaptations, Digestive physiology,
  Conservation, And exposure to pollution, Looking at how the genetic variation of
  hemoglobin genes within marine fishes is related to adaptations of occupying different
  oceanic depths, Understanding how gene copy number, Patterns of gene expression,
  And gut microbiomes contribute to dietary specializations, Collaborates with the
  moore institute for plastic pollution research to determine what type of pollutants
  are found in marine fishes'
