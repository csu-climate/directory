Name: David Hassenzahl
Campus: Chico
College: Colleges of Natural Sciences and Agriculture
Department: ''
Title: Dean of Natural Sciences
Email: dhassenzahl@csuchico.edu
Research Interests: 'Dr. hassenzahl is interested in the role
  of uncertainty in environmental, Health and technological risk decision-making from
  the individual to global scales. he is also interested in interdisciplinary environmental
  education in general, And in particular that surrounding climate change and energy.'
Teaching Interests: 'As dean, Dr. hassenzahl does not currently
  have an instructional appointment, But he has taught courses on environmental science,
  Risk analysis, Sustainable development, And related topics from the introductory
  undergraduate to the doctoral level.'
Sustainability Contributions: Dr. Hassenzahl is Dean of the College of Natural Sciences
  and Interim Dean of the College of Agriculture. He supports climate, resilience,
  and sustainability programs and scholars in the two colleges and across campus.
  Previously he was Founding Dean of the Falk School of Sustainability at Chatham
  University and founding member/Past President of the Association of Environmental
  Studies and Sciences.
