Name: Scott Hamilton
Campus: San Jose
College: College of Science
Department: Moss Landing Marine Laboratories
Title: Associate Professor of Ichthyology
Email: shamilton@mlml.calstate.edu
Research Interests: 'Fish ecology, Global change biology, Fisheries
  science, Conservation, Marine protection, Kelp forest, Coral reef, Aquaculture'
Teaching Interests: 'Teaching Interests: Marine ecology, Ichthyology, Subtidal ecology,
  Biostatistics'
Sustainability Contributions: Research on the effects of warming temperatures, ocean
  acidification, and hypoxia on the behavior, physiology, and reproduction of temperate
  fishes. Investigations of the effects of multiple climate stressors on species interactions
  of fish, invertebrates, and seaweeds. Evaluation of the effects of marine protection
  on multiple coastal ecosystems and resilience to climate change. Design of integrated
  multi-trophic aquaculture (IMTA) systems to mitigate impacts of ocean acidification
  on shellfish. Conservation aquaculture to aid restoration of kelp forests.
