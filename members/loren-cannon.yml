Sustainability Contributions: 'Intersectionality & Social Justice in Sustainability:
  brings an important social justice and equity perspective to sustainability, aligning
  with the increasingly recognized need for intersectional approaches to sustainability
  that include human rights and inclusivity. Also a Core Faculty of the Environment
  & Community M.A. program, Dr. Cannon is directly involved in graduate education
  related to sustainability and community development.'
