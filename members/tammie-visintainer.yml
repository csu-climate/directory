Sustainability Contributions: 'Professor Visintainer is a recipient of an NSF Faculty
  Early Career Development Program (CAREER) award entitled: "CAREER - Transforming
  Science Teaching and Learning through Empowering Teachers and Students as Climate
  Justice Action Researchers and Change Agents." Her research focuses on climate justice
  and community health. Climate justice action research (CJAR) combines elements of
  community-based science and youth participatory action research to support teachers
  and students as action researchers and change agents in their school communities
  focusing on the climate justice issue of urban and extreme heat. Teachers participate
  in a year-long professional learning experience where they gain the content knowledge
  and research practices needed to design and implement CJAR curricular units during
  the school year. Students identify local issues of heat, collect science (e.g.,
  temperature), mapping (e.g., percent tree canopy cover), and community experience
  data (e.g., oral histories with elders), create arts-based science stories to share
  their findings with the public, and advocate for change.'
