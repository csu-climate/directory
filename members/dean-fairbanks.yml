Name: Dean Fairbanks
Campus: Chico
College: College of Behavioral and Social Sciences
Department: Geography And Environmental Studies
Title: Professor
Email: dhfairbanks@csuchico.edu
Research Interests: 'Research Interests: Dean is an interdisciplinary researcher who
  applies spatial analysis and remote sensing to study how landscapes shape ecological
  processes and human well-being. his work spans land cover change, Biodiversity,
  Fire–grazer dynamics, Water markets, Agricultural land values, And the spatial dimensions
  of hunger and food insecurity. by integrating satellite imagery with socioeconomic
  data, He examines how environmental and institutional forces produce uneven outcomes
  across regions and communities.'
Teaching Interests: 'Teaching Interests: Earth systems and physical geography, Introduction
  to gis, Analysis and modeling in gis, Remote sensing of environment, Impacts of
  digital society, Geopolitics, Economic geography'
