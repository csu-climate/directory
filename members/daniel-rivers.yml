Name: Daniel Rivers
Campus: San Jose
College: College of Social Sciences
Department: Humanities (American Studies) & English And Comparative Literature
Title: Assistant Professor of Humanities
Email: daniel.rivers@sjsu.edu
Research Interests: 'Ecosomatics, Ecophilosophy, Somatics and
  trauma, Performance studies, Performance as research, Environmental humanities,
  Critical whiteness studies, Creative arts and healing'
Teaching Interests: 'Environmental humanities, American studies,
  Queer and feminist studies, U.s. literature, Human-animal studies, And the public
  humanities'
Sustainability Contributions: Professor Rivers' forthcoming book, California Futures,
  uses a case study format to explore both the history of settlers' speculations about
  California's natural environment, as well as alternative forms of "nature cultural"
  imagination that approach care for the environment as a rallying point for creating
  more equitable and resilient future. At SJSU, Professor Rivers coordinates the certificate
  in Environmental Humanities. They have also collaborated on two environmental justice
  event series, about water toxicity and wildfire, in California and they've presented
  at events in partnership with the Commonwealth Club Climate One program.
