Name: Samantha Leigh
Campus: Dominguez Hills
College: College of Natural and Behavioral Sciences
Department: Biology
Title: Assistant Professor
Email: sleigh@csudh.edu
Research Interests: 'Uses a blend of anatomy, Physiology, Biochemistry,
  And molecular biology to answer questions about digestive performance in response
  to varying ecosystem fluxes, Mainly in marine organisms, Recent projects include:,
  1) understanding the mechanisms involved with the digestion and assimilation of
  seagrass in the bonnethead shark, 2) investigating how the ingestion of microplastics
  by important marine food web foundation species impacts their physiological processes,
  3) a phylogenetic and functional analysis of the morphology of the spiral intestine
  in sharks'
Teaching Interests: 'Teaching Interests: Principles of biology, Animal physiology,
  Seminar in biological and biomedical research'
Sustainability Contributions: Research project on the pervasiveness of microplastics
  in the Southern California Bight.
