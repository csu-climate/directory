Name: Laurie Richmond
Campus: Humboldt
College: College of Natural Resources & Sciences
Department: Environmental Science & Management
Title: Professor Environmental Planning
Email: Laurie.Richmond@humboldt.edu
Research Interests: 'Marine, Coastal and community resilience'
Teaching Interests: 'Teaching Interests: Approach environmental teaching and research
  from an interdisciplinary perspective that allows for the exploration of the connections
  between social and ecological systems.environmental impact assessment, Coastal &
  marine planning, Senior planning practicum, Human dimensions of natural resources'
Sustainability Contributions: Leadership in the Humboldt Sea Level Rise Initiative,
  coordinating Humboldt Bay resilience planning among tribes, municipalities, NGOs,
  and scholars. Community-based sustainability planning projects, notably 2019 Fishing
  Community Sustainability Plans developed through bottom-up processes in Shelter
  Cove and Eureka, which are actively being implemented. Scholarly contributions on
  resilience and adaptation, co-authoring “Transformative Sea‑level Rise Research
  and Planning” (2023) with a cross-sector team integrating Indigenous knowledge and
  equity in coastal adaptation. Advancement of co-management in fisheries, contributing
  to research on Indigenous rights and environmental justice in fisheries policy across
  the Pacific.
