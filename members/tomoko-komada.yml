Research Interests: 'Research Interests: Understanding the organic carbon cycle with
  emphasis on the processes taking place at the land-ocean margin. utilizes natural
  abundance radiocarbon (14c), In conjunction with the stable isotope 13c, To investigate
  the sources, Cycling, And fate of various organic carbon pools in the environment.
  topics of interest include: sediment biogeochemistry and the significance of coastal
  benthic processes in organic matter dynamics, Composition of organic matter suspended
  in rivers and its fate in the ocean, Organic carbon preservation in salt marshes,
  And the role of organic-mineral associations in organic matter degradation and preservation.'
Teaching Interests: 'Teaching Interests: Chemistry, Oceanography.'
