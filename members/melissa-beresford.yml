Sustainability Contributions: Dr. Beresford investigates the norms and social infrastructures
  that enable people adapt to water and other resources insecurities, especially in
  the context of the global water crisis and accelerating climate change. Funded by
  an NSF CAREER grant, she is currently leading an international group of scholars
  researching how “moral economies” (a specific type of norm-based social system)
  allow people to cope with and adapt to water insecurity cross-culturally. Additionally,
  she collaborates within the Water Insecurity Community of Practice (WISE-CP), working
  to develop new experiential metrics for household water insecurity in United States
  and other high-income contexts. As an ethnographer and methodologist who specializes
  in field methods and qualitative data analysis, she grounds her scholarship in community-based
  mixed-methods field work with water insecure households in California and the broader
  U.S. West.
