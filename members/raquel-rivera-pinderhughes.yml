Notes: 'Contributor to: "Raquel’s “Green Job Training Model” was used to form the
  Oakland Green Job Corps and informed the development of the Obama Administration’s
  Pathways out of Poverty Initiative funded with ARRA funds. Raquel is the creator
  of Roots of Success, an environmental literacy and work readiness curriculum specifically
  designed for youth and adults that face significant barriers to education and employment.".'
