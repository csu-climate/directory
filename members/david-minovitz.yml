Research Interests: 'Research Interests: Water quality monitoring, Seafloor mapping,
  Marine spatial planning, Coastal watershed dynamics, And the use of geospatial and
  remote sensing tools for environmental assessment. i''ve contributed to projects
  with nasa and noaa on coastal sediment transport, Coral reef ecosystem health, And
  data gap analyses in marine protected areas.'
Teaching Interests: 'Teaching Interests: Introductory environmental science, Oceanography,
  Scientific research & communication, Environmental policy, And human impact on coastal
  ecosystems. i emphasize place-based learning and regularly integrate case studies
  from the monterey bay region into my courses.'
Sustainability Contributions: Courses highlight climate resilience, sustainability
  challenges in coastal regions, and human impacts on marine and watershed ecosystems.
  I mentor student research projects focused on stormwater runoff, agricultural pollution,
  sea level rise, and marine conservation. I'm committed to empowering students to
  make informed decisions for a more sustainable future.
