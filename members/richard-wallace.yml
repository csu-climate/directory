Teaching Interests: ''
Sustainability Contributions: Professor Wallace is interested in how cultural anthropology
  can inform our understanding of conservation and development challenges in the Amazon,
  and contribute to the challenge of solving them. He did a research project; Exploring
  Forest Community-Market Interactions in Acre, Brazil. This project examined the
  interaction between forest communities and urban market tradesmen (and women) and
  businesses. It was conducted in collaboration with the Acre Research and Extension
  in Agroforestry Group (PESACRE), a local non-governmental organization which works
  with forest communities in the region to promote community development, sustainable
  agroforestry and conservation. Their research examined how communities and enterprises
  interact at the business trade fair of the FLORA fair, a forest product trade fair
  held in Rio Branco, which brings together community leaders and urban entrepreneurs
  in a relaxed business setting to negotiate contracts for forest-based food and artisan
  products.
