Sustainability Contributions: 'Practivistas: founded this immersive program where
  students collaborate with communities in Latin America to design and implement sustainable
  technologies. Projects include building classrooms from plastic bottles in the Dominican
  Republic, showcasing practical applications of appropriate technology. Swale: as
  a project manager, contributes to this floating food forest in New York City, providing
  free, public access to healthy food and promoting urban agriculture. Waterpod, Flock
  House, WetLand: advised and managed these "ephemeral architecture" projects, which
  explored sustainable living solutions through art and design.'
