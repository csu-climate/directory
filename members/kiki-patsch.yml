Name: Kiki Patsch
Campus: Channel Islands
College: College of Arts and Sciences
Department: Environmental Science And Resource Management
Title: Department Chair and Associate Professor
Email: kiki.patsch@csuci.edu
Research Interests: 'Current research focuses on coastal geomorphology
  and processes, Shoreline hazard assessment, Sediment budgets analysis, Sea cliff
  and beach erosion, Reductions in the natural supply of sediment to the coast, Coastal
  armoring, And coastal access equity along the california coast'
Teaching Interests: 'Teaching Interests: Beaches and coastal geomorphology, Physical
  oceanography, And geospatial analysis, Emphasizing hands-on fieldwork, Uav monitoring,
  And clear, Audience-ready maps for california coastal settings.'
Sustainability Contributions: Studying how coasts are and will be affected by climate
  change and human activity including erosion and sea level rise. Co authored Beaches
  on the Edge.
