  california'
Teaching Interests: ''
Sustainability Contributions: Professor To and his students are working with Lawrence
  Livermore National Lab (LLNL) scientists to develop machine learning algorithms
  to identify fuel sources on the ground using aerial and satellite imagery to create
  better models of wildfires focusing on California. He and his students are also
  utilizing data from NASA Ground-Based Instruments AERONET and National Oceanic and
  Atmospheric Administration (NOAA) to measure and correlate aerosol in the air, with
  wind, temperature and precipitation in the Central Valley of California.
