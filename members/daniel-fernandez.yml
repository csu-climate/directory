Name: Daniel Fernandez
Campus: Monterey Bay
College: College of Science
Department: Applied Environmental Science
Title: Professor
Email: dfernandez@csumb.edu
Research Interests: 'Fog research, Systems research'
Teaching Interests: 'Physics, Sustainability systems, Infrastructure
  systems, Environmental studies capstone.'
Sustainability Contributions: Fog researcher and a fog water collector. Interested
  in the possible use of collected fog water to promote carbon sequestration through
  enhanced vegetated growth and the use of fog water in general as a means of climate
  adaptation. As well, focused on understanding the impact of fog formation in light
  of climate change. Also teaches systems thinking and is interested in systems approaches
  to examining various scenarios for climate change mitigation and adaptation.
