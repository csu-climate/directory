Research Interests: 'Research Interests: Dr. dizard is a cultural anthropologist primarily
  interested in controlling processes. his research explores the existence and impacts
  of the pleasures of prejudice in a variety of contexts: the conceptualization and
  exploitation of ‘nature’, The social construction of categories of ‘enemy’ and ‘belonging’,
  The experience of violence, ‘identity formation’ and social inequality among ethnic
  minorities, Particularly native americans, As well as children and women, And with
  regard to questions of authenticity, Interpretation and narrative.'
