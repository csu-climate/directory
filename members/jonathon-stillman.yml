Research Interests: 'Environmental physiology of organisms to
  (1) explore the physiological linkages between environmental change (such as climate
  change) and ecosystem responses (such as shifting populations or alteration in species
  interactions), And (2) to learn more about the basic physiological mechanisms that
  organisms use in responding to their environments. organisms include coastal marine
  invertebrates, Such as porcelain crabs, Corals, And coccolithophores.'
Teaching Interests: 'Teaching Interests: Environmental physiology, Animal diversity
  and physiology.'
