Sustainability Contributions: Ongoing collaborations with the UConn (University of
  Connecticut) Optics and Remote Sensing Lab (COLORS) to develop new methods for measuring
  breaking waves, bubble plumes and whitecap statistics. Ongoing collaboratives efforts
  with the Lamont Doherty Earth Observatory (Columbia University) to develop wave
  dependent air-sea interaction parameterizations. Lead PI in a multi institution
  collaborative effort. Through NSF funding in collaboration with UConn the Lamont
  Doherty Earth Observatory, WHOI and the University of Rhode Island they will be
  deploying a field campaign to study wave driven turbulence at the air-sea interface.
  Their main objective is to improve wave driven turbulent parameterizations in global
  circulation models.
