Sustainability Contributions: The WET Center engages with early stage entrepreneurs
  to commercialize their ideas or accelerate their existing ventures. We focus on
  cultivating entrepreneurs in the water, energy, and agricultural sectors. The WET
  Center has engaged with more than 500 individual entrepreneurs and accelerated more
  than 85 companies. Collectively, these companies have raised $450 million in public,
  private, and institutional investments and have been responsible for more than 840
  new jobs - many of them based in the immediate Central Valley.
