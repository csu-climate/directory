Research Interests: 'Research Interests: Dr. greene’s broad areas of research interests
  include tectonics and sedimentation, Sequence stratigraphy and depositional systems.
  he focuses mainly on basin scale questions using a variety of technologies to address
  paleogeographic and tectonic histories of basins.'
Teaching Interests: ''
Sustainability Contributions: The underlying objective of his research is to provide
  a more realistic geologic model for groundwater flow simulators to use so reasonable
  assessments on water volumes and flow paths can help dictate regional water policy
  for the foreseeable future.
