Teaching Interests: 'Teaching Interests: Implementation of technology in engineering
  curriculum (i.e. virtual reality)'
Sustainability Contributions: Investigating how roof gardens, vertical forests, and
  vegetated walls influence structural performance. This work is supported by an NSF
  CAREER award and is generating the first data of its kind to quantify how natural
  hazards and life-cycle effects impact structural dynamic response. Additional research
  investigates modular "tiny home" housing - an increasingly popular solution in major
  metropolitan areas facing housing shortages. Recent computational modeling and experimental
  testing have revealed concerning seismic performance for these structures, underscoring
  the need for continued investigation. This research aims to integrate the principles
  of sustainability and structural resilience, fostering new approaches to meet the
  evolving needs of 21st-century communities.
Notes: 'Contributor to: She is a member of ASCE, EERI, SEAONC, CAIES, and SWE.'
