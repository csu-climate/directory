Name: Katharyn Boyer
Campus: San Francisco
College: Science and Engineering
Department: Biology
Title: Professor and Interim Executive Director of Estuary and Ocean Science Center
Email: katboyer@sfsu.edu
Research Interests: 'Restoration and conservation of coastal habitats,
  Primarily in salt marshes and seagrass beds, Mainly with vascular plants, Macroalgae,
  And invertebrates as well as the water and sediments on and in which they live.
  this work is mostly experimental, Conducted in field, Greenhouse, And outdoor mesocosm
  (tank or pot) settings.'
Teaching Interests: 'Teaching Interests: Marine science, Marine ecology.'
Sustainability Contributions: Habitat restoration in an era of changing climate, with
  a focus on protecting shorelines, increasing carbon sequestration, and reducing
  ocean acidification, as well as increasing equity and agency in shoreline restoration
  outcomes for low-lying underserved communities. Lead scientist on living shorelines
  projects that restore habitats such as eelgrass and native oysters. Contributed
  to the Resilient by Design Bay Area Challenge. Co-project lead on an effort to restore
  eelgrass and assess the habitat for spawning herring following the Cosco Busan oil
  spill.
