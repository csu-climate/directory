Sustainability Contributions: work focuses on how youth participate in climate change
  related activities and exploring the role of politics and social values in climate
  science learning. Recent work has included the use of art and narrative to support
  learner identity and agency in climate change, and participatory action research
  to foreground community voice and power in designing equitable climate change responses.
