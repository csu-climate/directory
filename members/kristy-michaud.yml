Sustainability Contributions: Kristy Michaud is a political scientist whose research
  focuses on political behavior and policy making, with an emphasis on environmental
  politics and policy. Her recent research has examined the intersection of knowledge,
  values, and trust and the impact that those factors have on attitudes and policy
  preferences related to global climate change and energy issues. She has been a member
  of the Green Core Planning Team since its establishment in 2008. As a member, she
  has been involved with the CSUN Greening Initiative’s transportation plan, which
  aims to promote sustainable campus and community transportation. She is also involved
  in the development of the University’s sustainability curriculum.
