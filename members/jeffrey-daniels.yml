Name: Jeffrey Daniels
Campus: East Bay
College: College of Health
Department: Public Health
Title: Lecturer
Email: jeff.daniels@csueastbay.edu
Research Interests: 'Research Interests: Human health risk from multimedia, Multi
  pathway exposure to toxins (e.g., Chemical, Biological, Radiological, Emerging),
  Disease prevention, Epidemiology, Toxicology, And environmental health policy'
Teaching Interests: 'Teaching Interests: Environmental health and policy, Climate
  change, Disease outbreaks, Epidemiology, Toxicological risk and health physics,
  Precautionary principle'
Sustainability Contributions: Interests include prospective and retrospective health
  risk assessments for substances of toxicological concern introduced into environmental
  media based on consideration of multiple exposure pathways. Worked for the Lawrence
  Livermore National Laboratory in Livermore, NASA Ames Research Center at Moffett
  Field, and The Desert Research Institute of the Nevada System of Higher Education
  in Las Vegas. Appointments include review committees for the National Academies
  of Science, Engineering, and Medicine (NASEM). Currently employed by CSU East Bay
  as a Lecturing Professor for the Department of Public Health.
