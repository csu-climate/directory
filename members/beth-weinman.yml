Name: Beth Weinman
Campus: Fresno State
College: Science and Mathematics
Department: Earth And Environmental Sciences
Title: Professor
Email: bweinman@csufresno.edu
Research Interests: 'Sustainability, Hydrogeology, Sedimentology,
  And soils. specific topics include dredging to maintain coasts in morro bay, Groundwater
  aquifer biogeochemistry in asia and the central valley, Community-based research,
  Soil health, And biochar-based carbon sequestration on farms and along the san joaquin
  river.'
Teaching Interests: 'Introductory geology, First-year sustainability-based
  critical thinking and lifelong learning courses, Interdisciplinary hydrogeology,
  And climate solutions courses.'
Sustainability Contributions: Campus-wide High Impact Practices. Connecting climate
  change to research, teaching, and community activities. Career Center Advisory Council,
  supporting experiential and paid capstone learning opportunities (i.e., SEI Energize
  Colleges, SEI Climate Fellows, Climate Action Corps, and First Carbon Solutions).
Notes: 'Contributor to: Connecting climate change to research, teaching, and community
  activities; Sustainability at Fresno State; She''s had by far the most recommendations
  from other faculty to be on this directory.'
