Sustainability Contributions: Professor Russell’s research primarily focuses on the
  conservation and restoration of forest communities. He also has research projects
  aimed at measuring the effectiveness of environmental education programs in the
  public and private sectors. He is founding director of the Mendocino Institute which
  researches and promotes environmental issues in Mendocino county.
