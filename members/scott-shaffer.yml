Name: Scott Shaffer
Campus: San Jose
College: College of Science
Department: Biological Sciences
Title: Professor of Biological Sciences
Email: scott.shaffer@sjsu.edu
Research Interests: 'Professor shaffer''s research lab primarily
  focuses on seabirds as model to understand how animals exploit marine resources
  across vast ocean scapes and coastal habitats. this includes the use of biologging
  tools (e.g. tracking devices, Accelerometers, Time depth recorders) to explore the
  behavioral flexibility, Effort, And distribution of seabirds that forage throughout
  the north pacific.'
Teaching Interests: 'He teaches courses related to ecology and
  evolution, And marine biology including conservation biology, Ecology, Experimental
  sampling design and analysis, And physiological ecology'
Sustainability Contributions: His research adds to the ecological base of knowledge
  about marine animals and their habitat use, which supports the creation of or maintenance
  of marine protected areas. In a more applied capacity, he is a part of a team focused
  on understanding seabird interactions with vessels at sea to reduce bycatch. Finally,
  he is a member of several working groups focused on the potential impacts of ocean
  wind energy development on marine megafauna.
