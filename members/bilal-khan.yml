Name: Bilal Khan
Campus: San Bernadino
College: College of Natural Sciences
Department: School Of Computer Science And Engineering
Title: Assistant Professor
Email: bilal.khan@csusb.edu
Research Interests: 'Develop analytical and advanced machine/deep
  learning approaches for causal analysis and decision support modeling for autonomous
  and smart water treatment, Human behavioral analysis using computer vision, Real-time
  embedded systems (sensor networks and iot) for resource management, Data science
  (big/time-series data) for water consumption/supply and water use prediction for
  small disadvantaged communities, Safer design and use of nanotechnology (nanotoxicology
  & nanomaterial exposure assessment) using machine learning, Predictive modeling
  and data mining approaches, Mobile and web application development, Water treatment
  technology - cyber-infrastructure for virtual water treatment systems'
Teaching Interests: 'Teaching Interests: Artificial intelligence (machine learning,
  Deep reinforcement learning, Computer science), Data science, Mobile and web application
  development, Software engineering, Operating systems'
Sustainability Contributions: Developed and maintained an online nanoinformatics platform
  for environmental impact assessment of engineered nanomaterials (ENMs) Working on
  developing analytical and advanced machine/deep learning approaches for autonomous
  and smart water treatment systems Developed the largest online database of nanomaterials
  (Nano Databank) in the field of nanotechnology that consists of the studies on ENM
  toxicity, characterization and exposure analysis Developed data-driven models and
  cloud-based cyber-infrastructure for water use patterns of small agricultural communities
  and the development of virtual water district (California) Co-developed a patent
  pending technology for membrane-based reverse-osmosis (RO) water treatment that
  utilizes software engineering principles and deep learning approaches for real-time
  detection and identification of membrane fouling and scaling.
