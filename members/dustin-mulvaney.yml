Name: Dustin Mulvaney
Campus: San Jose
College: College of Social Sciences
Department: Environmental Studies
Title: Professor
Email: dustin.mulvaney@sjsu.edu
Research Interests: 'Political ecology, Science & technology studies,
  Solar power commodity chains, Land use, & recycling, Natural resources & land use
  policy, Sustainable food-energy-water transitions'
Teaching Interests: ''
Sustainability Contributions: 'Work focuses on the social and environmental dimensions
  of natural resources, land use change, and global production systems. Research focuses
  on questions about emerging technologies, socio-ecological change, and environmental
  justice. Works on solar energy commodity chain. Published "Solar Power, Innovation,
  Sustainability, and Environmental Justice" (University of California Press, 2019)
  and the textbook Sustainable Energy Transitions: Socio-Ecological Dimensions of
  Decarbonization published in 2020. Writing and research on energy storage and critical
  minerals. Professor Mulvaney is part of the Lithium Valley Equity Technical Advisory
  Group advising Comite Civico del Valle on issues related to the development of solar
  power, geothermal, and lithium near the Salton Sea in Imperial County, California.'
