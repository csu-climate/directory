Research Interests: 'The effect of suspension feeders on local
  nutrient cycling (carbon, Nitrogen, And silicon) in shallow and deep-sea habitats,
  Feeding selectivity, Niche partitioning, And specialization of suspension feeders,
  Determine effective design of marine protected areas for benthic invertebrate species,
  The mechanism behind the ‘sponge loop’ and its ability to shunt microbial carbon
  into animal food webs, Using novel visualization methods to determine whether dissolved
  organic carbon can be taken up directly by animal cells, Drivers of behavior and
  activity of sessile benthic animals in shallow water and the deep sea, Ecological
  energetics of deep-sea habitats, Energetic costs of various physiological processes,
  Prevalence and selectivity of microplastic ingestion by suspension feeders'
