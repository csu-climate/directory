Sustainability Contributions: Professor Ali Mehran leads ARAS, an undergraduate oriented
  research club. The main research interest is UAV remote sensing, modeling physically
  based hydrological processes and statistical approaches with multi scale remote
  sensing products to address water resources issues arising from climatic changes,
  land cover / land use changes, and water allocation.
