Sustainability Contributions: Samar Bannister is the Director of Marine Programs and
  is also the captain for the Training Vessel Golden Bear. This department oversees
  all shipboard and waterfront training, as well as the professional development of
  cadets. This comprehensive training program includes rowboats, workboats, tugboats,
  and the Training Ship Golden Bear (TSGB). The TSGB, owned by the Maritime Administration
  (MARAD) under the U.S. Department of Transportation and operated by Cal Poly Maritime,
  serves as the primary training platform for cadets. It provides hands-on application
  of technological skills introduced in the classroom, leadership development through
  work assignments, and practical experience with the Cadet Leadership Department.
  Cadets typically complete two summer sea terms aboard TSGB and one summer training
  cruise on a commercial vessel. This structured training program fulfills the sea
  time requirements set by the U.S. Coast Guard and the training competencies mandated
  by the Standards of Training, Certification, and Watchkeeping (STCW), as established
  by the International Maritime Organization (IMO). Upon graduation, cadets in the
  licensed degree programs earn either a U.S. Coast Guard Unlimited Tonnage Third
  Officer’s License or an Unlimited Horsepower Third Engineer’s License.
