Sustainability Contributions: 'Lin, Jean Yen-Chun. 2023. A Spark in the Smokestacks:
  Environmental Organizing in Beijing Middle-Class Communities. New York: Columbia
  University Press. (Winner, 2024 Robert E. Park Book Award, Section on Community
  and Urban Sociology, American Sociological Association). A Spark in the Smokestacks
  explores how everyday community civic life cultivates organizing capacity against
  environmental threats, and tells the story of how a pivot to citizen science engagement
  and environmental data collection helped a rising urban middle class overcome institutional
  barriers in an authoritarian context.'
