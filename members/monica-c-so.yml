Name: Monica C. So
Campus: Chico
College: College of Natural Sciences
Department: Chemistry And Biochemistry
Title: Associate Professor
Email: mso@csuchico.edu
Research Interests: 'The long-term research goals of the so lab
  are three-fold: (i) to study structure-property relationships of self-assembled
  materials, (ii) to characterize self-assembled materials on surfaces, And (iii)
  to study their optical, Photophysical, Electrochemical, And optoelectronic behaviors.'
Teaching Interests: ''
Sustainability Contributions: The So Lab harnesses chemical intuition to approach
  fundamental challenges in physics and tackle sustainability problems. Their research
  has important environmental implications, such as improving the long-term stability
  of solar panels on our rooftop, improving the performance of Li-S batteries, and
  as well as more effectively cleaning up water after wildfires and oil spills. She
  is also the principal investigator for The BATTERIES Team which researches lithium
  sulfur batteries to create a greener world.
Notes: ''
