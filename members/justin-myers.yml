Name: Justin Myers
Campus: Fresno State
College: Social Sciences
Department: Sociology
Title: Associate Professor
Email: justinmyers@csufresno.edu
Research Interests: 'Exploring how the social organization of
  power shapes the distribution of social, Economic, And environmental benefits and
  burdens in society, Especially along lines of class, Race, Gender, And nationality.
  focus in particular on how conflicts over the production, Appropriation, And allocation
  of these benefits and burdens play out between communities, Organizations, State-based
  actors, And corporations.'
Teaching Interests: 'Environmental sociology, Sociology of food
  & agriculture, Social inequality, Social movements, Critical theory.'
Sustainability Contributions: Environmental sociology, sociology of food & agriculture,
  environmental justice & food justice, settler colonialism, social movements.
