Research Interests: 'Research focuses on understanding the complex
  interactions between water, The environment, And human systems, With an emphasis
  on water resources management, Climate change, Riparian ecosystems, And risk assessment
  related to droughts and floods. she strives to develop innovative solutions—whether
  through physics-based models or data-driven approaches—that promote the sustainable
  management of water resources while enhancing the resilience of ecosystems and human
  systems.'
Teaching Interests: ''
Sustainability Contributions: The WISE Lab at the Department of Earth and Environmental
  Sciences (ERTH) in the College of Natural Sciences, California State University,
  Chico, studies environmental hydrology and water resources management with emphasis
  on environmental flows, sustainable allocation, and climate adaptation.
