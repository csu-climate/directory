Sustainability Contributions: Professor Brown Blake's recent projects include Climate
  justice in nursing education. She updated her courses to encourage students to examine
  how nursing and climate change intersect and impact their lives. At the faculty
  level, Brown Blake has encouraged her colleagues to incorporate more solutions and
  case studies on climate change and less emphasis on problem-focused lectures. This
  change resulted in Chico State joining the national Nurses Climate Challenge, an
  initiative that challenges nursing programs to demonstrate their commitment to teaching
  innovative content that addresses climate change and its impact on health.
