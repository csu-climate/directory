Name: Sarah Cohen
Campus: San Francisco
College: Science and Engineering
Department: Biology
Title: Professor
Email: sarahcoh@sfsu.edu
Research Interests: 'How ecological, Behavioral, And environmental
  features shape evolution and genetic systems in diverse organisms. how life history,
  Physiological, Or behavioral attributes of species affect population structure in
  marine and estuarine settings. results often directly address questions about coastal
  and marine conservation related to our ability to detect, Predict, And remediate
  anthropogenic effects on natural populations including seagrass, Sea stars, Sea
  squirts, And bryozoa. parasite ecology and life cycle variation. ecology and evolution
  of immunogenetic recognition systems in colonial invertebrates, Estuarine fishes,
  Endangered mice, And threatened marine mammals.'
Teaching Interests: 'Teaching Interests: Marine biology, Invertebrate biology, Ecology
  and evolution.'
Sustainability Contributions: Faculty at SFSU's Estuary & Ocean Science Center and
  the SFSU Department of Biology. Evaluating seagrass population health in natural
  and restored populations, remediation of sea star populations following sea star
  wasting disease, discovering remaining genetic variation in endangered, threatened,
  and invasive populations of coastal animals and plants.
